<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to POS System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assests/css/style.css">
</head>

<body>

<div class="container-left">
    <h3 class="container-left-title">POS Manage</h3>

    <ol type="1" class="navigation-menu">
        <li><a href="#" data-page="customers">Manage Customers</a></li>
        <li><a href="#" data-page="items">Manage Items</a></li>
        <li><a href="#" data-page="orders">Order Management</a></li>
    </ol>

    <button class="log-out" onclick="logOut()">Log Out</button>
</div>

<div class="container-right">
    <div id="content-area">
        <h2>Welcome to POS System</h2>
        <p>Select a Menu Item</p>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Load all modules via one entry point -->
<script type="module" src="assests/js/app.js"></script>

<script>
    window.logOut = function () {
        Swal.fire({
            title: "Are you sure?",
            text: "You will be logged out!",
            icon: "warning",
            showCancelButton: true,
            confirmButtonText: "Yes"
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({ title: "Logged Out!", text: "You have successfully logged out.", icon: "success" })
                    .then(() => { window.location.href = "index.html"; });
            }
        });
    };
</script>

</body>
</html>
