<div class="container-top">
    <h3>Place Order</h3>

    <form style="margin-top:20px">

        <div class="row mb-3">

            <div class="col-md-4">
                <label>Order ID :</label>
                <input type="text" id="order_id_input" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Customer ID :</label>
                <input type="text" id="order_customer_id_input" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Order Date :</label>
                <input type="date" id="order_date_input" class="form-control">
            </div>

        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label>Item Code :</label>
                <input type="text" id="order_item_code_input" class="form-control">
            </div>

            <div class="col-md-4">
                <label>QTY :</label>
                <input type="text" id="order_item_qty_input" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Total :</label>
                <div class="form-control">Rs. <span id="order_total">0.00</span></div>
            </div>
        </div>

        <div class="btn-section">
            <button type="button" id="order_add_item_btn" class="btn btn-primary">Add Item</button>
            <button type="button" id="order_remove_item_btn" class="btn btn-danger">Remove Item</button>
            <button type="button" id="place_order_btn" class="btn btn-success">Place Order</button>
            <button type="button" id="order_reset_btn" class="btn btn-secondary">Reset</button>
            <button type="button" id="order_history_btn" class="btn btn-warning" style="margin-left: 440px">Order History</button>
        </div>

    </form>
</div>

<div class="container-bottom">
    <table class="table table-striped table-hover">

        <thead>
        <tr>
            <th>Item Code</th>
            <th>Item Name</th>
            <th>Unit Price</th>
            <th>QTY</th>
            <th>Sub Total</th>
        </tr>
        </thead>

        <tbody id="order_cart_tbody"></tbody>

    </table>
</div>
