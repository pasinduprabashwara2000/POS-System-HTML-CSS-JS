<div class="container-top">
    <h3>Manage Customers</h3>

    <form style="margin-top:20px">

        <div class="row mb-3">

            <div class="col-md-4">
                <label>Id :</label>
                <input type="text" id="customer_id_input" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Full Name :</label>
                <input type="text" id="customer_full_name_input" class="form-control">
            </div>

            <div class="col-md-4">
                <label>Address :</label>
                <input type="text" id="customer_address_input" class="form-control">
            </div>

        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label>Contact Number :</label>
                <input type="text" id="customer_contact_number_input" class="form-control">
            </div>
        </div>

        <div class="btn-section">
            <button type="button" id="customer_save_btn" class="btn btn-primary">Save</button>
            <button type="button" id="customer_update_btn" class="btn btn-success">Update</button>
            <button type="button" id="customer_delete_btn" class="btn btn-danger">Delete</button>
            <button type="button" id="customer_reset_btn" class="btn btn-secondary">Reset</button>
        </div>

    </form>
</div>

<div class="container-bottom">
    <table class="table table-striped table-hover">

        <thead>
        <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Address</th>
            <th>Contact Number</th>
        </tr>
        </thead>

        <tbody id="customers_tbody"></tbody>

    </table>
</div>
